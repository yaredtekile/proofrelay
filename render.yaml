services:
  - type: web
    name: proofrelay
    runtime: docker
    healthCheckPath: /health
    envVars:
      - key: PROOFRELAY_RUN_ROOT
        value: /tmp/proofrelay-runs
      - key: OPENAI_API_KEY
        sync: false
      - key: B2_KEY_ID
        sync: false
      - key: B2_APP_KEY
        sync: false
      - key: B2_BUCKET
        sync: false
      - key: B2_REGION
        sync: false
      - key: B2_PUBLIC_URL_BASE
        sync: false
